#
# Pre-bootloader setup: ensure /dev, /proc, /sys are bound for chroot environment
# This fixes grub-install failing due to missing device nodes in chroot
---
dontChroot: true
timeout: 30
firmwareType:
    efi:
    - mount --bind /dev ${ROOT}/dev
    - mount --bind /proc ${ROOT}/proc
    - mount --bind /sys ${ROOT}/sys
    - mount -t efivarfs efivarfs ${ROOT}/sys/firmware/efi/efivars
    bios:
    - mount --bind /dev ${ROOT}/dev
    - mount --bind /proc ${ROOT}/proc
    - mount --bind /sys ${ROOT}/sys